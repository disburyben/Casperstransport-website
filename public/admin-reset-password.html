<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Caspers Transport</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F0E;--bg2:#181817;--bg3:#222220;
  --border:#333330;--text:#F0EFE8;--text2:#9E9D95;--text3:#5C5C58;
  --accent:#4FC1DB;--accent2:#409EB3;--red:#E05252;--radius:5px;
  --font-disp:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px}
body{display:flex;align-items:center;justify-content:center}
.card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:40px 36px}
.logo{font-family:var(--font-disp);font-size:22px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);margin-bottom:4px}
.logo span{color:var(--accent)}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:32px}
label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text2);margin-bottom:6px}
input{display:block;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 13px;outline:none;transition:border-color .15s;margin-bottom:18px}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.btn{display:block;width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius);color:#0F0F0E;font-family:var(--font-disp);font-size:16px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;transition:background .15s;margin-top:4px}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;border-radius:var(--radius);padding:10px 13px;font-size:13px;margin-bottom:16px;line-height:1.5}
.msg.err{background:rgba(224,82,82,0.12);border:1px solid rgba(224,82,82,0.35);color:var(--red)}
.msg.ok{background:rgba(79,193,219,0.1);border:1px solid rgba(79,193,219,0.3);color:var(--accent)}
.msg.show{display:block}
.spinner{display:inline-block;width:14px;height:14px;margin-right:8px;border:2px solid rgba(15,15,14,0.3);border-top-color:#0F0F0E;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{font-size:11px;color:var(--text3);margin-top:-12px;margin-bottom:16px;line-height:1.5}
.strength{height:3px;border-radius:2px;margin-top:-14px;margin-bottom:16px;transition:background 0.3s,width 0.3s;width:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CASPERS <span>TRANSPORT</span></div>
  <div class="subtitle" id="subtitle">Set a new password</div>

  <div class="msg" id="msg"></div>

  <div id="form-wrap">
    <label for="password">New password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength()">
    <div class="strength" id="strength-bar"></div>
    <div class="hint">Use at least 8 characters with a mix of letters and numbers.</div>

    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password">

    <button class="btn" id="btn" onclick="resetPassword()">Set new password</button>
  </div>

  <div id="success-wrap" style="display:none;text-align:center">
    <div style="font-size:40px;margin-bottom:16px">✓</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:8px">Password updated</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:24px">You can now sign in with your new password.</div>
    <button class="btn" onclick="window.top.location.href='/admin/login'">Go to login →</button>
  </div>
</div>

<script type="module">
import { createBrowserClient } from 'https://esm.sh/@supabase/ssr@0.5.2';

const SUPABASE_URL  = 'https://ipwtvxzwbmrjjqytbdfy.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwd3R2eHp3Ym1yampxeXRiZGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDcxODAsImV4cCI6MjA5MDg4MzE4MH0.U7VYJaBOhxRXzhOfxM9MZpGrJQSaaVl5PJMyR4skxiU';
const sb = createBrowserClient(SUPABASE_URL, SUPABASE_ANON);

const msg = document.getElementById('msg');
const btn = document.getElementById('btn');

function showMsg(text, type) {
  msg.textContent = text;
  msg.className = 'msg ' + type + ' show';
}

// Supabase embeds the recovery token in the URL hash — exchange it for a session
const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
const code = new URLSearchParams(window.location.search).get('code');

if (code) {
  // PKCE flow — exchange code for session
  const { error } = await sb.auth.exchangeCodeForSession(code);
  if (error) {
    showMsg('This reset link has expired or already been used. Request a new one.', 'err');
    document.getElementById('form-wrap').style.display = 'none';
  }
} else if (hashParams.get('type') === 'recovery') {
  const { error } = await sb.auth.setSession({
    access_token:  hashParams.get('access_token'),
    refresh_token: hashParams.get('refresh_token'),
  });
  if (error) {
    showMsg('This reset link has expired or already been used. Request a new one.', 'err');
    document.getElementById('form-wrap').style.display = 'none';
  }
} else {
  showMsg('No reset token found. Please use the link from your password reset email.', 'err');
  document.getElementById('form-wrap').style.display = 'none';
}

window.checkStrength = function() {
  const pw = document.getElementById('password').value;
  const bar = document.getElementById('strength-bar');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#E05252','#F5A623','#4FC1DB','#1A7A4A'];
  const widths  = ['25%','50%','75%','100%'];
  bar.style.background = colors[score - 1] || 'var(--bg3)';
  bar.style.width = score > 0 ? widths[score - 1] : '0';
};

window.resetPassword = async function() {
  const pw   = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;

  if (pw.length < 8) { showMsg('Password must be at least 8 characters.', 'err'); return; }
  if (pw !== conf)   { showMsg('Passwords do not match.', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Updating…';
  msg.classList.remove('show');

  const { error } = await sb.auth.updateUser({ password: pw });

  if (error) {
    showMsg(error.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Set new password';
    return;
  }

  document.getElementById('form-wrap').style.display = 'none';
  document.getElementById('success-wrap').style.display = 'block';
  document.getElementById('subtitle').textContent = 'All done';
};

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.resetPassword();
});
</script>
</body>
</html>
