<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caspers Transport — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F0E;--bg2:#181817;--bg3:#222220;
  --border:#333330;--text:#F0EFE8;--text2:#9E9D95;--text3:#5C5C58;
  --accent:#4FC1DB;--accent2:#409EB3;
  --red:#E05252;--radius:5px;
  --font-disp:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px}
body{display:flex;align-items:center;justify-content:center}

.card{
  width:100%;max-width:380px;background:var(--bg2);
  border:1px solid var(--border);border-radius:8px;
  padding:40px 36px;
}
.logo{
  font-family:var(--font-disp);font-size:22px;font-weight:800;
  letter-spacing:0.04em;text-transform:uppercase;color:var(--text);
  margin-bottom:4px;
}
.logo span{color:var(--accent)}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:32px}

label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.07em;color:var(--text2);margin-bottom:6px}
input{
  display:block;width:100%;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:var(--font-body);font-size:14px;
  padding:10px 13px;outline:none;transition:border-color .15s;margin-bottom:18px;
}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}

.btn{
  display:block;width:100%;padding:11px;
  background:var(--accent);border:none;border-radius:var(--radius);
  color:#0F0F0E;font-family:var(--font-disp);font-size:16px;font-weight:700;
  letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;
  transition:background .15s;margin-top:4px;
}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.err{
  display:none;background:rgba(224,82,82,0.12);border:1px solid rgba(224,82,82,0.35);
  border-radius:var(--radius);padding:10px 13px;font-size:13px;color:var(--red);
  margin-bottom:16px;line-height:1.5;
}
.err.show{display:block}

.spinner{
  display:inline-block;width:14px;height:14px;margin-right:8px;
  border:2px solid rgba(15,15,14,0.3);border-top-color:#0F0F0E;
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CASPERS <span>TRANSPORT</span></div>
  <div class="subtitle">Admin portal</div>

  <div class="err" id="err"></div>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="admin@casperstransport.com.au" autocomplete="email">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

  <button class="btn" id="btn" onclick="login()">Sign in</button>
  <div id="forgot-wrap" style="text-align:center;margin-top:16px">
    <a href="#" onclick="forgotPassword(event)" style="font-size:12px;color:var(--text3);text-decoration:none">Forgot password?</a>
  </div>
  <div id="reset-msg" style="display:none;margin-top:16px;font-size:13px;color:var(--accent);text-align:center;line-height:1.5"></div>
</div>

<script type="module">
import { createBrowserClient } from 'https://esm.sh/@supabase/ssr@0.5.2';

const SUPABASE_URL  = 'https://ipwtvxzwbmrjjqytbdfy.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwd3R2eHp3Ym1yampxeXRiZGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDcxODAsImV4cCI6MjA5MDg4MzE4MH0.U7VYJaBOhxRXzhOfxM9MZpGrJQSaaVl5PJMyR4skxiU';

const sb  = createBrowserClient(SUPABASE_URL, SUPABASE_ANON);
const err = document.getElementById('err');
const btn = document.getElementById('btn');

// If already logged in and admin → go straight to /admin
const { data: { session } } = await sb.auth.getSession();
if (session) {
  const { data: profile } = await sb.from('user_profiles').select('role').eq('id', session.user.id).single();
  if (profile?.role === 'admin') { window.top.location.href = '/admin'; }
}

window.login = async function() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  err.classList.remove('show');
  if (!email || !password) { showErr('Enter your email and password.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showErr(error.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : error.message);
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  // Check role
  const { data: { session: s } } = await sb.auth.getSession();
  const { data: profile } = await sb.from('user_profiles').select('role').eq('id', s.user.id).single();

  if (!profile || profile.role !== 'admin') {
    await sb.auth.signOut();
    showErr('Your account does not have admin access.');
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  // Navigate the top-level window (parent of iframe)
  window.top.location.href = '/admin';
};

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.login();
});

function showErr(msg) {
  err.textContent = msg;
  err.classList.add('show');
}

window.forgotPassword = async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('reset-msg');
  if (!email) {
    showErr('Enter your email address above first.');
    return;
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.top.location.origin + '/admin/login',
  });
  if (error) { showErr(error.message); return; }
  msg.style.display = 'block';
  msg.textContent = 'Password reset email sent. Check your inbox.';
  document.getElementById('forgot-wrap').style.display = 'none';
};
</script>
</body>
</html>
