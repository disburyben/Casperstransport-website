<!DOCTYPE html>
<html lang="en" data-supabase-url="" data-supabase-anon="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caspers Transport — Driver Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F0E;--bg2:#181817;--bg3:#222220;
  --bd:#333330;--bd2:#444440;
  --text:#F0EFE8;--text2:#9E9D95;--text3:#5C5C58;
  --blue:#4FC1DB;--blue2:#409EB3;
  --bluebg:rgba(79,193,219,0.12);--bluebdr:rgba(79,193,219,0.3);
  --red:#E03028;--redbg:rgba(224,48,40,0.12);
  --green:#2E9E5B;--greenbg:rgba(46,158,91,0.12);
  --r:8px;--font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{
  font-family:var(--font-b);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  padding:24px;max-width:480px;margin:0 auto;
}
.login-card{
  width:100%;background:var(--bg2);border:1px solid var(--bd);
  border-radius:16px;padding:40px 32px;
}
.logo{display:flex;justify-content:center;margin-bottom:32px}
.logo img{height:48px;width:auto}
.login-title{
  font-family:var(--font-d);font-size:26px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.04em;color:var(--text);
  text-align:center;margin-bottom:6px;
}
.login-sub{
  font-size:12px;color:var(--text3);text-align:center;
  font-family:var(--font-d);text-transform:uppercase;
  letter-spacing:0.15em;font-weight:600;margin-bottom:32px;
}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.field label{
  font-family:var(--font-d);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.25em;color:var(--blue);
}
.field input{
  background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);
  padding:13px 14px;font-family:var(--font-b);font-size:15px;font-weight:500;
  color:var(--text);outline:none;transition:border-color 0.2s;width:100%;
  -webkit-appearance:none;
}
.field input::placeholder{color:var(--text3)}
.field input:focus{border-color:var(--bluebdr)}
.field input:focus{box-shadow:0 0 0 3px rgba(79,193,219,0.08)}
.btn-login{
  width:100%;padding:15px;margin-top:8px;
  background:var(--blue);color:var(--bg);
  border:none;border-radius:var(--r);
  font-family:var(--font-d);font-size:15px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{background:var(--blue2)}
.btn-login:active{transform:scale(0.98)}
.btn-login:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;transform:none}
.error-msg{
  display:none;margin-top:14px;padding:11px 14px;
  background:var(--redbg);border:1px solid rgba(224,48,40,0.25);
  border-radius:var(--r);font-size:13px;color:var(--red);text-align:center;
}
.error-msg.show{display:block}
.spinner{
  width:18px;height:18px;border:2px solid rgba(0,0,0,0.2);
  border-top-color:var(--bg);border-radius:50%;
  animation:spin 0.6s linear infinite;display:none;
}
.spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.login-footer{
  margin-top:28px;text-align:center;
  font-size:11px;color:var(--text3);
  font-family:var(--font-d);text-transform:uppercase;letter-spacing:0.12em;
}
.login-footer a{color:var(--blue);text-decoration:none}
.login-footer a:hover{text-decoration:underline}
</style>
</head>

  <div class="login-title">Driver Portal</div>
  <div class="login-sub">Sign in to view today's jobs</div>

  <form id="login-form" novalidate>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com"
             autocomplete="email" autocapitalize="none" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••"
             autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="btn-login">
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">Sign In</span>
    </button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <div class="login-footer">
    Problems? Contact <a href="mailto:admin@casperstransport.com.au">admin</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const html       = document.documentElement;
const supabase   = createClient(
  html.dataset.supabaseUrl,
  html.dataset.supabaseAnon
);

// If already logged in as a driver, redirect straight to /driver
const { data: { session } } = await supabase.auth.getSession();
if (session) {
  // Verify role before redirecting
  const { data: profile } = await supabase
    .from('user_profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();
  if (profile?.role === 'driver' || profile?.role === 'admin') {
    sessionStorage.setItem('caspers_driver_token', session.access_token);
    window.location.href = '/driver';
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btn-text');
  const errorEl  = document.getElementById('error-msg');

  // Loading state
  btn.disabled      = true;
  spinner.classList.add('show');
  btnText.textContent = 'Signing in...';
  errorEl.classList.remove('show');

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) throw new Error(error.message);
    if (!data.session) throw new Error('Login failed — no session returned');

    // Check role
    const { data: profile } = await supabase
      .from('user_profiles')
      .select('role')
      .eq('id', data.session.user.id)
      .single();

    if (!profile || !['driver', 'admin'].includes(profile.role)) {
      await supabase.auth.signOut();
      throw new Error('This account does not have driver access.');
    }

    // Store token for driver API calls
    sessionStorage.setItem('caspers_driver_token', data.session.access_token);

    // Redirect to driver dashboard
    window.location.href = '/driver';

  } catch (err) {
    btn.disabled        = false;
    spinner.classList.remove('show');
    btnText.textContent = 'Sign In';
    errorEl.textContent = err.message || 'Login failed. Check your details and try again.';
    errorEl.classList.add('show');
  }
});
</script>
</body>
</html>
